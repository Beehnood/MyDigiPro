vich_uploader:
    db_driver: orm
    mappings:
        blog_images:
            uri_prefix: /uploads/blogs
            upload_destination: '%kernel.project_dir%/public/uploads/blogs'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer

        blog_videos:
             uri_prefix: /uploads/blog_videos
             upload_destination: '%kernel.project_dir%/public/uploads/blog_videos'

