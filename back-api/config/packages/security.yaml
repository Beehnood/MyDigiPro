security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
        App\Entity\User:
            algorithm: auto

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        login:
            pattern: ^/api/login
            stateless: true
            json_login:
                check_path: /api/login
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            jwt: ~

    access_control:
        # --- Public ---
        - { path: ^/api/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/register, roles: PUBLIC_ACCESS }
        - { path: ^/api/docs, roles: PUBLIC_ACCESS }
        - { path: ^/api/test, roles: PUBLIC_ACCESS }
        - { path: ^/api/movies, roles: PUBLIC_ACCESS }
        - { path: ^/api/randomize, roles: PUBLIC_ACCESS }

        # --- Blogs ---
        - { path: ^/api/blogs$, roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/blogs/[0-9]+$, roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/blogs, roles: [ROLE_USER, ROLE_ADMIN], methods: [POST] }
        - { path: ^/api/blogs/[0-9]+$, roles: [ROLE_USER, ROLE_ADMIN], methods: [PUT, PATCH, DELETE] }

        # --- Admin ---
        - { path: ^/api/admin, roles: ROLE_ADMIN }

        # --- Par défaut : il faut être connecté ---
        - { path: ^/api, roles: PUBLIC_ACCESS, methods: [OPTIONS] }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
