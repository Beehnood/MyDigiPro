name: Front CI/CD

on:
  push:
    branches: [main]
    paths:
      - "front-cine/**"
      - ".github/workflows/front-deploy.yml"

  pull_request:
    branches: [main]
    paths:
      - "front-cine/**"
      - ".github/workflows/front-deploy.yml"

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: front-pages
  cancel-in-progress: false

jobs:
  build_test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: front-cine

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: front-cine/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Build application
        run: npm run build

      - name: Setup Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: front-cine/dist

  deploy:
    if: github.event_name != 'pull_request'
    needs: build_test
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy front to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4